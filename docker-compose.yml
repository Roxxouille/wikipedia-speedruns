x-app-environment: &app-environment
  SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
  MYSQL_HOST: db
  MYSQL_USER: ${MYSQL_USER:-wikispeedruns}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
  DATABASE: ${DATABASE:-wikipedia_speedruns}
  MAIL_SERVER: ${MAIL_SERVER:-}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-}
  MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
  MAIL_SUPPRESS_SEND: ${MAIL_SUPPRESS_SEND:-false}
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
  PAGERANK_FILE: ${PAGERANK_FILE:-}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:8000"
    environment:
      <<: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Optional: mount a PageRank file and set PAGERANK_FILE=/data/pagerank.txt in .env
      - ./data:/data:ro
    networks:
      - app-network

  celery:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_worker.celery", "worker", "--loglevel=info"]
    environment:
      <<: *app-environment
      INIT_DB: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Optional: scraper_graph assets / PageRank files if you have them
      - ./data:/data:ro
    networks:
      - app-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DATABASE:-wikipedia_speedruns}
      MYSQL_USER: ${MYSQL_USER:-wikispeedruns}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      app-network:
        aliases:
          - db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      app-network:
        aliases:
          - redis

volumes:
  mysql-data:
  redis-data:

networks:
  app-network:
    driver: bridge
